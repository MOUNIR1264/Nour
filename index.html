<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Joyeux anniversaire NOUR ❤️</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: system-ui, sans-serif;
    color: white;
    overflow: hidden;
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 15px;
    text-align: center;
}

h1 {
    font-size: 1.4rem;
    margin: 10px 0;
}

#puzzle {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 3px;
    margin-top: 15px;
}

.piece {
    background-image: url("photo-nour.jpg");
    background-size: 300% 300%;
    border-radius: 6px;
    cursor: pointer;
}

.piece.selected {
    outline: 3px solid white;
}

#message {
    display: none;
    margin-top: 20px;
    background: rgba(0,0,0,0.35);
    padding: 18px;
    border-radius: 18px;
    font-size: 1.1rem;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Joyeux anniversaire NOUR 🎂</h1>
    <p>Reconstitue le puzzle 💖</p>

    <div id="puzzle"></div>

    <div id="message">
        💕 NOUR 💕<br><br>
        Chaque pièce de ce puzzle me rappelle<br>
        combien tu es précieuse pour moi ✨<br><br>
        Joyeux anniversaire mon amour ❤️
    </div>
</div>

<script>
const puzzle = document.getElementById("puzzle");
const message = document.getElementById("message");

const size = 3;
let pieces = [];
let selected = null;

// créer les pièces
for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
        const piece = document.createElement("div");
        piece.className = "piece";

        piece.style.backgroundPosition = `${(x * 100) / (size - 1)}% ${(y * 100) / (size - 1)}%`;

        piece.dataset.correct = y * size + x;
        pieces.push(piece);
    }
}

// mélanger
pieces.sort(() => Math.random() - 0.5);

// afficher
pieces.forEach((piece, index) => {
    piece.dataset.current = index;
    puzzle.appendChild(piece);

    piece.addEventListener("click", () => {
        if (!selected) {
            selected = piece;
            piece.classList.add("selected");
        } else if (selected !== piece) {
            swap(selected, piece);
            selected.classList.remove("selected");
            selected = null;
            checkWin();
        }
    });
});

function swap(a, b) {
    const pos = a.style.backgroundPosition;
    a.style.backgroundPosition = b.style.backgroundPosition;
    b.style.backgroundPosition = pos;

    const temp = a.dataset.correct;
    a.dataset.correct = b.dataset.correct;
    b.dataset.correct = temp;
}

function checkWin() {
    const all = document.querySelectorAll(".piece");
    let win = true;

    all.forEach((piece, index) => {
        if (piece.dataset.correct != index) {
            win = false;
        }
    });

    if (win) {
        message.style.display = "block";
    }
}
</script>

</body>
</html>
